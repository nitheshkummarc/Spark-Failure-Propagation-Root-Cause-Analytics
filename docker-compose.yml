# =============================================================================
# Spark Root-Cause Analytics — Docker Compose
# Development environment for reproducing the Spark RCA pipeline.
#
# Services:
#   - namenode:          HDFS NameNode
#   - datanode:          HDFS DataNode
#   - resourcemanager:   YARN Resource Manager
#   - nodemanager:       YARN Node Manager
#   - historyserver:     MapReduce History Server
#   - spark-master:      Spark Master
#   - spark-worker-1:    Spark Worker (primary)
#   - spark-worker-2:    Spark Worker (secondary)
#   - spark-shell:       Spark client for job submission
#
# Usage:
#   docker compose up -d
#   docker exec namenode hdfs dfsadmin -report
#
# Requirements:
#   Docker Desktop with 16GB+ RAM allocated
# =============================================================================

services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"     # HDFS Web UI
      - "8020:8020"     # HDFS RPC
    environment:
      - CLUSTER_NAME=spark-rca
    env_file:
      - .env.example
    volumes:
      - namenode-data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    ports:
      - "9864:9864"     # DataNode Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    depends_on:
      - namenode
    volumes:
      - datanode-data:/hadoop/dfs/data

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    ports:
      - "8088:8088"     # YARN Resource Manager Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    depends_on:
      - namenode

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    depends_on:
      - resourcemanager

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    depends_on:
      - namenode
    volumes:
      - historyserver-data:/hadoop/yarn/timeline

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"     # Spark Master Web UI
      - "7077:7077"     # Spark Master RPC
    environment:
      - SPARK_MODE=master

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master

  spark-shell:
    image: apache/spark:3.5.1
    container_name: spark-shell
    command: tail -f /dev/null
    environment:
      - HADOOP_CONF_DIR=/etc/hadoop
      - HADOOP_USER_NAME=root
    volumes:
      - .:/opt/spark-rca
    depends_on:
      - spark-master
      - namenode
      - resourcemanager

volumes:
  namenode-data:
  datanode-data:
  historyserver-data:
