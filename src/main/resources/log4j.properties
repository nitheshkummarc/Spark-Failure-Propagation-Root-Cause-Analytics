# ============================================================================
# Log4j Configuration for Spark RCA Project
# Silences Spark's verbose logging to highlight RCA analysis output
# ============================================================================

# Root logger - Set to WARN to suppress most Spark noise
log4j.rootCategory=WARN, console

# Console appender configuration
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# ============================================================================
# Silence Spark's Chatty Components
# ============================================================================
log4j.logger.org.apache.spark=WARN
log4j.logger.org.apache.spark.sql=WARN
log4j.logger.org.apache.spark.repl=WARN
log4j.logger.org.apache.spark.api.python=WARN
log4j.logger.org.apache.spark.sql.catalyst=WARN
log4j.logger.org.apache.spark.sql.execution=WARN
log4j.logger.org.apache.spark.scheduler=WARN
log4j.logger.org.apache.spark.storage=WARN
log4j.logger.org.apache.spark.executor=WARN

# Silence Hadoop
log4j.logger.org.apache.hadoop=WARN
log4j.logger.org.apache.hadoop.hdfs=WARN
log4j.logger.org.apache.hadoop.ipc=WARN
log4j.logger.org.apache.hadoop.conf=ERROR
log4j.logger.org.apache.hadoop.security=WARN

# Silence other noisy libraries
log4j.logger.org.apache.parquet=ERROR
log4j.logger.parquet=ERROR
log4j.logger.org.spark_project=WARN
log4j.logger.io.netty=WARN
log4j.logger.org.eclipse.jetty=WARN
log4j.logger.akka=WARN

# ============================================================================
# RCA Project Logging - Show our analysis output prominently
# ============================================================================
log4j.logger.com.sparkrca=INFO
log4j.logger.com.sparkrca.preprocessing=INFO
log4j.logger.com.sparkrca.ml=INFO
log4j.logger.com.sparkrca.injection=INFO

# Enable DEBUG for specific modules when troubleshooting
# log4j.logger.com.sparkrca.preprocessing.PropagationAnalyzer=DEBUG
# log4j.logger.com.sparkrca.preprocessing.DAGBuilder=DEBUG
